<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar na Atividade | Portal Educacional</title>
  <style>
    :root {
      --ink: #102033;
      --muted: #53657f;
      --line: #d8e3ee;
      --teal: #0b8f86;
      --teal-dark: #075f5a;
      --sun: #f7c948;
      --paper: #f6fafc;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(247,201,72,.28), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(11,143,134,.16), transparent 30%),
        linear-gradient(135deg, #eef8f7 0%, #f8fbfd 58%, #fff9ea 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 440px);
      gap: 22px;
      align-items: stretch;
    }

    .hero, .panel {
      border: 1px solid rgba(16,32,51,.12);
      border-radius: 8px;
      box-shadow: 0 24px 60px rgba(16,32,51,.12);
    }

    .hero {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 44px;
      color: white;
      background:
        linear-gradient(135deg, rgba(5,54,68,.98), rgba(7,95,90,.92)),
        #053644;
    }

    .brand {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      margin-bottom: 34px;
      border-radius: 8px;
      color: white;
      font-weight: 900;
      background: linear-gradient(135deg, var(--teal), var(--sun));
    }

    .pill {
      width: fit-content;
      margin-bottom: 18px;
      padding: 7px 14px;
      border-radius: 999px;
      color: var(--teal-dark);
      background: #dff8f4;
      font-weight: 900;
      font-size: 13px;
    }

    h1 {
      margin: 0;
      max-width: 650px;
      font-size: 56px;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 560px;
      margin: 22px 0 0;
      font-size: 21px;
      line-height: 1.48;
    }

    .panel {
      display: grid;
      align-content: center;
      gap: 18px;
      padding: 34px;
      background: rgba(255,255,255,.94);
    }

    h2 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
    }

    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 4px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    input {
      width: 100%;
      min-height: 64px;
      padding: 0 18px;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: white;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .08em;
      text-align: center;
      text-transform: uppercase;
    }

    input:focus {
      outline: 4px solid rgba(11,143,134,.16);
      border-color: var(--teal);
    }

    button, .ghost-link {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      color: white;
      background: var(--teal);
      font-size: 16px;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover, .ghost-link:hover { box-shadow: 0 12px 26px rgba(16,32,51,.16); }
    button:active, .ghost-link:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: .62; box-shadow: none; }

    .ghost-link {
      color: var(--ink);
      border: 1px solid var(--line);
      background: white;
    }

    .notice {
      display: none;
      padding: 13px 14px;
      border: 1px solid rgba(11,143,134,.24);
      border-radius: 8px;
      color: var(--teal-dark);
      background: #e9f8f6;
      font-weight: 800;
      line-height: 1.35;
    }

    .notice.error {
      border-color: rgba(180,35,24,.25);
      color: var(--danger);
      background: #fff0ed;
    }

    .notice.show { display: block; }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      .hero { min-height: auto; padding: 30px; }
      h1 { font-size: 42px; }
      .hero p { font-size: 18px; }
      .panel { padding: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Portal da criança">
      <div class="brand">E</div>
      <span class="pill">atividade liberada</span>
      <h1>Digite o código da sua atividade.</h1>
      <p>Depois disso, escolha a missão e faça uma parte de cada vez.</p>
    </section>

    <section class="panel" aria-label="Entrar por código">
      <div>
        <h2>Entrar</h2>
        <p class="muted">Use o código que o adulto passou para você.</p>
      </div>

      <form id="codeForm">
        <label>
          Código
          <input id="codeInput" autocomplete="one-time-code" inputmode="text" maxlength="12" placeholder="LER-4821">
        </label>
        <div class="actions">
          <button id="submitButton" type="submit">Começar</button>
          <a class="ghost-link" href="/">Voltar ao portal</a>
        </div>
      </form>

      <div id="message" class="notice" role="status"></div>
    </section>
  </main>

  <script>
    const form = document.querySelector("#codeForm");
    const input = document.querySelector("#codeInput");
    const button = document.querySelector("#submitButton");
    const message = document.querySelector("#message");

    function normalizeCode(value) {
      return String(value || "")
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, "")
        .slice(0, 9);
    }

    function formatCode(value) {
      const clean = normalizeCode(value);
      if (clean.length <= 3) return clean;
      return `${clean.slice(0, 3)}-${clean.slice(3)}`;
    }

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
      message.classList.add("show");
    }

    function clearMessage() {
      message.textContent = "";
      message.classList.remove("show", "error");
    }

    input.addEventListener("input", () => {
      const cursorAtEnd = input.selectionStart === input.value.length;
      input.value = formatCode(input.value);
      if (cursorAtEnd) input.selectionStart = input.selectionEnd = input.value.length;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();

      const code = input.value.trim();
      if (!code) {
        showMessage("Digite o código da atividade.", true);
        input.focus();
        return;
      }

      button.disabled = true;
      button.textContent = "Carregando...";

      try {
        const response = await fetch("/api/child-code-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code })
        });
        const data = await response.json();
        if (!response.ok || !data.ok || !data.child_url) {
          throw new Error(data.message || "Não foi possível abrir este código.");
        }
        showMessage("Código encontrado. Abrindo sua atividade...");
        window.location.href = data.child_url;
      } catch (error) {
        showMessage(error.message || "Código não disponível agora. Peça ajuda para um adulto.", true);
        button.disabled = false;
        button.textContent = "Começar";
      }
    });
  </script>
</body>
</html>
