<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal da Criança | Portal Educacional</title>
  <style>
    :root {
      --ink: #102033;
      --muted: #5d6b7d;
      --line: #d9e4ef;
      --paper: #ffffff;
      --wash: #f3f8fb;
      --teal: #13988f;
      --teal-dark: #08736c;
      --blue: #2f6edb;
      --sun: #ffc857;
      --coral: #ff7a6b;
      --shadow: 0 20px 55px rgba(16, 32, 51, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #eef8f5 56%, #fff8e8 100%);
      min-height: 100svh;
      letter-spacing: 0;
    }

    button, a {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 22px;
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(217, 228, 239, .9);
      border-radius: 8px;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 12px 32px rgba(16, 32, 51, .08);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 850;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--sun));
      box-shadow: 0 12px 25px rgba(19, 152, 143, .24);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 30px;
      padding: 5px 12px;
      border-radius: 999px;
      color: var(--teal-dark);
      background: #e4f7f4;
      font-size: 13px;
      font-weight: 850;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, .86fr) minmax(0, 1.14fr);
      gap: 20px;
      align-items: stretch;
    }

    .welcome {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      padding: clamp(24px, 5vw, 46px);
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, #073942 0%, #0d6f68 58%, #d19a28 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .welcome::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(1, 28, 38, .72), rgba(4, 73, 77, .1));
    }

    .welcome > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      max-width: 720px;
      margin: 18px 0 0;
      font-size: clamp(44px, 7vw, 80px);
      line-height: .98;
      letter-spacing: 0;
    }

    .welcome p {
      max-width: 560px;
      margin: 14px 0 0;
      font-size: clamp(18px, 2vw, 23px);
      line-height: 1.45;
    }

    .status {
      display: grid;
      gap: 8px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .12);
    }

    .status strong { font-size: 18px; }

    .panel {
      display: grid;
      align-content: start;
      gap: 16px;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .9);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    h2, h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h2 { font-size: clamp(26px, 4vw, 40px); }
    h3 { font-size: 22px; }

    .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .small { font-size: 14px; }

    .notice {
      padding: 13px 14px;
      border: 1px solid #bde7df;
      border-radius: 8px;
      color: #095b55;
      background: #e9f8f6;
      font-weight: 780;
    }

    .notice.error {
      border-color: #ffd0ca;
      color: #9d1c12;
      background: #fff2f0;
    }

    .assignments {
      display: grid;
      gap: 16px;
    }

    .assignment {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .mission-progress {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid #bde7df;
      border-radius: 8px;
      background: #effaf7;
    }

    .mission-progress .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #dce7f0;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--sun));
    }

    .items {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid #dce7f0;
      border-radius: 8px;
      background: var(--wash);
    }

    .item.done {
      border-color: #bde7df;
      background: #effaf7;
    }

    .item.done .module-icon {
      background: #18a77f;
    }

    .item.done .button {
      color: #095b55;
      background: #dff4ee;
      box-shadow: none;
      cursor: default;
    }

    .done-line {
      color: #095b55;
      font-weight: 900;
      font-size: 13px;
      margin-top: 4px;
    }

    .module-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font-weight: 900;
    }

    .module-icon.writing { background: var(--coral); }
    .module-icon.math { background: var(--sun); color: var(--ink); }
    .module-icon.reading { background: var(--teal); }
    .module-icon.english { background: var(--blue); }

    .free-list {
      display: grid;
      gap: 12px;
    }

    .free-card {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid #dce7f0;
      border-radius: 8px;
      background: #f8fbfd;
    }

    .button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 15px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      background: var(--teal);
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(19, 152, 143, .22);
    }

    .button:active {
      transform: translateY(1px) scale(.99);
      box-shadow: none;
    }

    .button.secondary {
      color: var(--ink);
      background: #e8eef5;
      box-shadow: none;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: .55;
      box-shadow: none;
    }

    .hidden { display: none !important; }

    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      .welcome { min-height: 420px; }
    }

    @media (max-width: 640px) {
      .shell { width: min(100% - 22px, 1120px); padding-top: 12px; }
      .topbar, .panel-header { align-items: stretch; flex-direction: column; }
      .item { grid-template-columns: 42px minmax(0, 1fr); }
      .item .button { grid-column: 1 / -1; width: 100%; }
      .free-card { grid-template-columns: 42px minmax(0, 1fr); }
      .free-card .button { grid-column: 1 / -1; width: 100%; }
      h1 { font-size: 38px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">E</div>
        <span>Portal Educacional</span>
      </div>
      <span class="pill">área da criança</span>
    </header>

    <section class="hero">
      <div class="welcome">
        <div>
          <span class="pill">missões liberadas</span>
          <h1 id="childTitle">Vamos praticar?</h1>
          <p id="childCopy">Suas atividades aparecem aqui quando um adulto libera uma missão para você.</p>
        </div>
        <div class="status">
          <strong id="statusTitle">Carregando atividades...</strong>
          <span id="statusCopy">Aguarde um instante.</span>
        </div>
      </div>

      <section class="panel" aria-live="polite">
        <div class="panel-header">
          <div>
            <h2>Atividades</h2>
            <p class="muted">Escolha uma missão para começar.</p>
          </div>
          <button class="button secondary" id="reloadButton" type="button">Atualizar</button>
        </div>
        <div id="message" class="notice hidden"></div>
        <div id="assignments" class="assignments"></div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      token: new URLSearchParams(window.location.search).get("token") || "",
      child: null,
      assignments: [],
      freeModules: []
    };

    const els = {
      childTitle: document.querySelector("#childTitle"),
      childCopy: document.querySelector("#childCopy"),
      statusTitle: document.querySelector("#statusTitle"),
      statusCopy: document.querySelector("#statusCopy"),
      message: document.querySelector("#message"),
      assignments: document.querySelector("#assignments"),
      reloadButton: document.querySelector("#reloadButton")
    };

    function showMessage(text, isError = false) {
      els.message.textContent = text;
      els.message.classList.toggle("error", isError);
      els.message.classList.remove("hidden");
    }

    function clearMessage() {
      els.message.textContent = "";
      els.message.classList.add("hidden");
      els.message.classList.remove("error");
    }

    function moduleLabel(service) {
      return {
        redacao: "Redação",
        interpretacao: "Interpretação",
        tabuada: "Tabuada"
      }[service] || "Atividade";
    }

    function applyReturnedCompletion(params) {
      if (params.get("portal_status") !== "activity_saved") return false;
      const assignmentId = params.get("assignment_id");
      const assignmentItemId = params.get("assignment_item_id");
      if (!assignmentId || !assignmentItemId) return false;

      let changed = false;
      state.assignments = state.assignments
        .map((assignment) => {
          if (assignment.id !== assignmentId) return assignment;
          const items = (assignment.items || []).map((item) => {
            if (item.id !== assignmentItemId) return item;
            changed = true;
            return { ...item, status: "done" };
          });
          return { ...assignment, items };
        })
        .filter((assignment) => (assignment.items || []).some((item) => item.status !== "done"));

      return changed;
    }

    function consumePortalReturnNotice() {
      const params = new URLSearchParams(window.location.search);
      const status = params.get("portal_status");
      if (!status) return;

      const service = params.get("service");
      const saved = status === "activity_saved";
      const changed = applyReturnedCompletion(params);
      showMessage(
        saved
          ? `${moduleLabel(service)} registrada. Você voltou para a missão.`
          : `Você voltou para a missão. Se terminou a atividade, peça ajuda ao adulto para conferir o registro.`,
        !saved
      );

      const cleanUrl = state.token
        ? `${window.location.origin}${window.location.pathname}?token=${encodeURIComponent(state.token)}`
        : `${window.location.origin}${window.location.pathname}`;
      window.history.replaceState({}, "", cleanUrl);
      if (changed) render();
    }

    function applyModuleConfigParams(params, item) {
      const config = item?.config || {};
      if (item?.module_id === "tabuada" && config.tabuada) {
        const tabuada = config.tabuada;
        if (Array.isArray(tabuada.tabs) && tabuada.tabs.length) {
          params.set("tabuada_tabs", tabuada.tabs.join(","));
        }
        if (tabuada.target_attempts) {
          params.set("target_attempts", String(tabuada.target_attempts));
        }
        if (tabuada.mode) {
          params.set("training_mode", String(tabuada.mode));
        }
      }
    }

    function assignmentConfigSummary(item) {
      if (item?.module_id !== "tabuada") return "";
      const tabuada = item.config?.tabuada;
      if (!tabuada) return "";
      const parts = [];
      if (Array.isArray(tabuada.tabs) && tabuada.tabs.length) parts.push(`tabuadas ${tabuada.tabs.join(", ")}`);
      if (tabuada.target_attempts) parts.push(`${tabuada.target_attempts} respostas`);
      return parts.join(" · ");
    }

    function assignmentProgress(assignment) {
      const items = assignment.items || [];
      const total = items.length;
      const done = items.filter((item) => item.status === "done").length;
      const percent = total ? Math.round((done / total) * 100) : 0;
      const message = !total
        ? "Missão em preparação."
        : done === total
          ? "Missão completa. Bom trabalho!"
          : done > 0
            ? "Você já começou. Faça uma parte de cada vez."
            : "Comece com calma pela primeira atividade.";
      return { total, done, percent, message };
    }

    function missionProgressHtml(progress) {
      return `
        <div class="mission-progress" aria-label="Progresso da missão">
          <div class="row">
            <span>${progress.done}/${progress.total} concluída${progress.done === 1 ? "" : "s"}</span>
            <span>${progress.percent}%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${progress.percent}%"></div></div>
          <div class="muted small">${progress.message}</div>
        </div>
      `;
    }

    function moduleUrl(item) {
      const module = item.module || {};
      if (!module.url) return "";
      const params = new URLSearchParams();
      params.set("child_id", state.child?.id || "");
      params.set("child_name", state.child?.full_name || "");
      if (state.child?.birth_date) params.set("child_birth_date", state.child.birth_date);
      if (state.child?.age !== null && state.child?.age !== undefined) params.set("child_age", String(state.child.age));
      params.set("assignment_item_id", item.id);
      if (item.assignment_id) params.set("assignment_id", item.assignment_id);
      params.set("portal_child_token", state.token);
      params.set("portal_return_url", window.location.href);
      applyModuleConfigParams(params, item);
      return `${module.url}?${params.toString()}`;
    }

    function freeModuleUrl(module) {
      if (!module.url) return "";
      const params = new URLSearchParams();
      params.set("child_id", state.child?.id || "");
      params.set("child_name", state.child?.full_name || "");
      if (state.child?.birth_date) params.set("child_birth_date", state.child.birth_date);
      if (state.child?.age !== null && state.child?.age !== undefined) params.set("child_age", String(state.child.age));
      params.set("portal_child_token", state.token);
      params.set("portal_return_url", window.location.href);
      return `${module.url}?${params.toString()}`;
    }

    function render() {
      els.assignments.innerHTML = "";

      if (state.child) {
        els.childTitle.textContent = `Olá, ${state.child.full_name}!`;
        els.childCopy.textContent = "Escolha uma atividade e faça uma parte de cada vez.";
      }

      if (!state.assignments.length) {
        if (!state.freeModules.length) {
          els.statusTitle.textContent = "Nenhuma atividade liberada agora.";
          els.statusCopy.textContent = "Quando houver uma missão, ela aparecerá aqui.";
          els.assignments.innerHTML = '<div class="notice">Nenhuma missão disponível no momento.</div>';
          return;
        }

        els.statusTitle.textContent = "Atividades livres disponíveis.";
        els.statusCopy.textContent = "Escolha uma atividade curta para praticar agora.";
        els.assignments.innerHTML = `
          <div>
            <span class="pill">atividades livres</span>
            <p class="muted">O adulto ainda não montou uma missão específica. Você pode praticar uma destas atividades.</p>
          </div>
          <div class="free-list"></div>
        `;

        const list = els.assignments.querySelector(".free-list");
        state.freeModules.forEach((module) => {
          const card = document.createElement("article");
          card.className = "free-card";
          card.innerHTML = `
            <div class="module-icon ${module.accent || "reading"}">${module.icon || "A"}</div>
            <div>
              <strong>${module.short_name || module.name}</strong>
              <div class="muted small">${module.description || "Atividade para praticar."}</div>
            </div>
            <button class="button" type="button">Começar</button>
          `;
          const button = card.querySelector("button");
          button.addEventListener("click", () => {
            const url = freeModuleUrl(module);
            if (!url) {
              showMessage("Esta atividade ainda não está disponível.", true);
              return;
            }
            button.disabled = true;
            button.textContent = "Abrindo...";
            window.location.href = url;
          });
          list.appendChild(card);
        });
        return;
      }

      const activeAssignments = state.assignments
        .map((assignment) => ({
          ...assignment,
          items: (assignment.items || []).filter((item) => item.status !== "done")
        }))
        .filter((assignment) => assignment.items.length);

      const pendingItemsCount = activeAssignments.reduce((total, assignment) => {
        return total + (assignment.items || []).filter((item) => item.status !== "done").length;
      }, 0);
      els.statusTitle.textContent = pendingItemsCount
        ? `${pendingItemsCount} atividade${pendingItemsCount === 1 ? "" : "s"} para fazer`
        : "Missões concluídas";
      els.statusCopy.textContent = pendingItemsCount
        ? "Comece pela primeira atividade disponível."
        : "Tudo entregue por aqui. O adulto já pode acompanhar o progresso.";

      if (!activeAssignments.length) {
        els.assignments.innerHTML = '<div class="notice">Todas as missões liberadas já foram concluídas. Bom trabalho!</div>';
        return;
      }

      activeAssignments.forEach((assignment) => {
        const progress = assignmentProgress(assignment);
        const card = document.createElement("article");
        card.className = "assignment";
        card.innerHTML = `
          <div>
            <span class="pill">missão</span>
            <h3>${assignment.title || "Atividade"}</h3>
            ${assignment.instructions ? `<p class="muted">${assignment.instructions}</p>` : ""}
          </div>
          ${missionProgressHtml(progress)}
          <div class="items"></div>
        `;

        const items = card.querySelector(".items");
        if (!assignment.items.length) {
          items.innerHTML = '<div class="notice">Esta missão ainda não tem atividades.</div>';
        }

        const sortedItems = [...assignment.items].sort((a, b) => {
          if (a.status === "done" && b.status !== "done") return 1;
          if (a.status !== "done" && b.status === "done") return -1;
          return (a.sort_order || 0) - (b.sort_order || 0);
        });

        sortedItems.forEach((item) => {
          const module = item.module || {};
          const isDone = item.status === "done";
          const configSummary = assignmentConfigSummary(item);
          const row = document.createElement("div");
          row.className = `item${isDone ? " done" : ""}`;
          row.innerHTML = `
            <div class="module-icon ${module.accent || "reading"}">${isDone ? "✓" : module.icon || "A"}</div>
            <div>
              <strong>${item.title || module.short_name || module.name || "Atividade"}</strong>
              ${item.child_instructions ? `<div class="muted small">${item.child_instructions}</div>` : ""}
              ${configSummary ? `<div class="muted small">${configSummary}</div>` : ""}
              ${isDone ? '<div class="done-line">Feita. Bom trabalho!</div>' : ""}
            </div>
            <button class="button" type="button">${isDone ? "Feita" : "Começar"}</button>
          `;

          const button = row.querySelector("button");
          button.disabled = isDone || !module.url;
          if (isDone) {
            items.appendChild(row);
            return;
          }
          button.addEventListener("click", () => {
            const url = moduleUrl(item);
            if (!url) {
              showMessage("Esta atividade ainda não está disponível.", true);
              return;
            }
            button.disabled = true;
            button.textContent = "Abrindo...";
            window.location.href = url;
          });

          items.appendChild(row);
        });

        els.assignments.appendChild(card);
      });
    }

    async function loadChildSession() {
      clearMessage();
      if (!state.token) {
        els.statusTitle.textContent = "Link incompleto.";
        els.statusCopy.textContent = "Peça para um adulto abrir sua atividade novamente.";
        showMessage("Não encontramos o acesso desta atividade.", true);
        render();
        return;
      }

      els.reloadButton.disabled = true;
      els.statusTitle.textContent = "Carregando atividades...";
      els.statusCopy.textContent = "Aguarde um instante.";

      try {
        const response = await fetch(`/api/child-session?token=${encodeURIComponent(state.token)}`);
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.message || "Não foi possível carregar as atividades.");
        }
        state.child = data.child;
        state.assignments = Array.isArray(data.assignments) ? data.assignments : [];
        state.freeModules = Array.isArray(data.free_modules) ? data.free_modules : [];
        render();
        consumePortalReturnNotice();
      } catch (error) {
        state.assignments = [];
        state.freeModules = [];
        els.statusTitle.textContent = "Não foi possível carregar.";
        els.statusCopy.textContent = "Peça ajuda para um adulto.";
        showMessage(error.message || "Não foi possível carregar as atividades.", true);
        render();
      } finally {
        els.reloadButton.disabled = false;
      }
    }

    els.reloadButton.addEventListener("click", loadChildSession);
    loadChildSession();
  </script>
</body>
</html>
